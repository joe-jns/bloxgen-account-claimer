<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 14px 16px;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0f1115;
      color: #e5e7eb;
    }
    h1 { font-size: 14px; margin: 0 0 4px; }
    h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #9ca3af; margin: 16px 0 8px; }
    .hint { font-size: 11px; color: #9ca3af; margin: 0 0 10px; }
    .seg { display: flex; gap: 6px; margin-bottom: 10px; }
    .seg label {
      flex: 1; text-align: center; font-size: 12px; padding: 7px 0; border-radius: 7px;
      background: #1f2937; cursor: pointer; border: 1px solid #374151;
    }
    .seg input { display: none; }
    .seg input:checked + span { font-weight: 700; color: #fff; }
    .seg label:has(input:checked) { background: #6d28d9; border-color: #6d28d9; }
    input[type="text"] {
      width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 7px;
      border: 1px solid #374151; background: #111827; color: #e5e7eb; font-size: 13px;
    }
    input[type="text"]:disabled { opacity: .4; }
    .field-hint { font-size: 10px; color: #6b7280; margin-top: 4px; }

    .claimed { max-height: 200px; overflow: auto; border: 1px solid #1f2937; border-radius: 8px; }
    .claimed:empty::after { content: "No claimed accounts yet."; display: block; padding: 12px; font-size: 12px; color: #6b7280; }
    .item { display: flex; justify-content: space-between; gap: 8px; padding: 7px 10px; border-bottom: 1px solid #1f2937; font-size: 12px; }
    .item:last-child { border-bottom: none; }
    .item .u { color: #e5e7eb; font-weight: 600; }
    .item .p { font-family: ui-monospace, Consolas, monospace; color: #34d399; user-select: all; }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    button.act {
      flex: 1; cursor: pointer; border: none; border-radius: 7px; padding: 8px 10px;
      font-size: 12px; font-weight: 600; color: #fff; background: #6d28d9;
    }
    button.act.sec { background: #374151; }
    button.act:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <h1>Bloxgen Account Claimer</h1>
  <div class="hint">Click <b>Claim</b> on an account (confirm once) to change its Roblox password and take ownership.</div>

  <h2>New password</h2>
  <div class="seg">
    <label><input type="radio" name="mode" value="random" /><span>Random (strong)</span></label>
    <label><input type="radio" name="mode" value="fixed" /><span>Fixed</span></label>
  </div>
  <input type="text" id="fixedPw" placeholder="Your fixed password (min 8 chars)" />
  <div class="field-hint">Used for every claim when "Fixed" is selected. Avoid the username inside it.</div>

  <h2>Claimed accounts (<span id="count">0</span>)</h2>
  <div class="claimed" id="claimed"></div>
  <div class="actions">
    <button class="act" id="copyAll">Copy all (user:pass)</button>
    <button class="act sec" id="clear">Clear</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
